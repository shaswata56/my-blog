<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.github.com https://sveltia-cms-auth.shaswata56.workers.dev https://unpkg.com; frame-src 'none'; object-src 'none';" />
  <title>Blog Admin — Shaswata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #1a1917;
      --bg2:     #242220;
      --border:  #4a4440;
      --text:    #d4c9bb;
      --muted:   #7a6a5a;
      --amber:   #c4a67a;
      --amber-h: #d9bc94;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body, #nc-root {
      background: var(--bg) !important;
      color: var(--text) !important;
      font-family: 'Inter', system-ui, sans-serif !important;
    }

    ::-webkit-scrollbar { width: 8px; background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }

    /* ── header ── */
    #nc-root > div > header,
    #nc-root > div > header > div {
      background: var(--bg2) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: none !important;
      color: var(--text) !important;
    }

    #nc-root > div > header * {
      background: transparent !important;
      box-shadow: none !important;
    }

    #nc-root > div > header nav a,
    #nc-root > div > header nav button,
    #nc-root > div > header [role="button"] {
      color: var(--muted) !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.78rem !important;
      letter-spacing: 0.06em !important;
      text-transform: uppercase !important;
      font-weight: 500 !important;
      border: none !important;
      border-radius: 0 !important;
    }

    #nc-root > div > header nav a.header-link-active,
    #nc-root > div > header nav a:hover,
    #nc-root > div > header nav button:hover,
    #nc-root > div > header [role="button"]:hover {
      color: var(--amber) !important;
      background: transparent !important;
    }

    /* hide quick add button */
    #nc-root > div > header [role="button"][aria-haspopup="true"]:not([aria-label]) {
      display: none !important;
    }

    #nc-root > div > header svg { color: var(--muted) !important; }
    #nc-root > div > header svg path[fill="#1E2532"] { fill: var(--bg2) !important; }

    /* ── sidebar ── */
    #nc-root aside {
      background: var(--bg2) !important;
      border-right: 1px solid var(--border) !important;
      box-shadow: none !important;
    }

    #nc-root aside h2 {
      color: var(--muted) !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.68rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.12em !important;
      font-weight: 500 !important;
    }

    #nc-root aside ul li a {
      color: var(--muted) !important;
      background: transparent !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.85rem !important;
      border-left: 2px solid transparent !important;
    }
    #nc-root aside ul li a.sidebar-active,
    #nc-root aside ul li a:hover {
      color: var(--amber) !important;
      background: transparent !important;
      border-left-color: var(--amber) !important;
    }

    /* sidebar search */
    #nc-root aside input {
      background: var(--bg) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      color: var(--text) !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.85rem !important;
    }
    #nc-root aside input:focus {
      border-color: var(--amber) !important;
      outline: none !important;
    }
    #nc-root aside svg { color: var(--muted) !important; fill: var(--muted) !important; }

    /* ── main / collection area ── */
    #nc-root main {
      background: var(--bg) !important;
    }

    /* collection top bar */
    #nc-root main > div:first-child {
      background: var(--bg2) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: none !important;
    }

    #nc-root main h1 {
      font-family: 'Merriweather', serif !important;
      color: var(--text) !important;
      font-size: 1.2rem !important;
      font-weight: 700 !important;
    }

    /* New Blog Posts button */
    #nc-root main > div:first-child a {
      background: transparent !important;
      color: var(--amber) !important;
      border: 1px solid var(--amber) !important;
      border-radius: 3px !important;
      box-shadow: none !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.78rem !important;
      font-weight: 500 !important;
      text-transform: uppercase !important;
      letter-spacing: 0.06em !important;
      padding: 0.45rem 1rem !important;
      transition: background 0.15s, color 0.15s !important;
    }
    #nc-root main > div:first-child a:hover {
      background: var(--amber) !important;
      color: var(--bg) !important;
    }

    /* sort by + view controls */
    #nc-root main [role="button"],
    #nc-root main button[aria-label*="view"] {
      color: var(--muted) !important;
      background: transparent !important;
      box-shadow: none !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.8rem !important;
    }
    #nc-root main [role="button"]:hover,
    #nc-root main button[aria-label*="view"]:hover {
      color: var(--amber) !important;
    }
    #nc-root main svg { fill: currentColor !important; }

    /* ── post list cards ── */
    #nc-root main ul li,
    #nc-root main ul li *,
    #nc-root main ul li a,
    #nc-root main ul li > div {
      background: var(--bg2) !important;
      box-shadow: none !important;
    }
    #nc-root main ul li {
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      transition: border-color 0.15s !important;
    }
    #nc-root main ul li:hover {
      border-color: var(--amber) !important;
    }
    #nc-root main ul li a { color: var(--text) !important; }
    #nc-root main ul li h2 {
      font-family: 'Merriweather', serif !important;
      color: var(--text) !important;
      font-size: 0.9rem !important;
      font-weight: 400 !important;
    }

    /* ── editor ── */
    #nc-root [data-slate-editor],
    #nc-root .cm-editor {
      background: var(--bg2) !important;
      color: var(--text) !important;
      font-family: 'Merriweather', serif !important;
    }
    .cm-gutters { background: var(--bg) !important; border-right: 1px solid var(--border) !important; }
    .cm-activeLine { background: rgba(196,166,122,0.04) !important; }
    .cm-cursor { border-left-color: var(--amber) !important; }

    /* ── form fields ── */
    #nc-root label {
      color: var(--muted) !important;
      font-size: 0.68rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.1em !important;
      font-family: 'Inter', sans-serif !important;
      font-weight: 500 !important;
    }
    #nc-root input[type="text"],
    #nc-root input[type="date"],
    #nc-root textarea,
    #nc-root select {
      background: var(--bg2) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      color: var(--text) !important;
      font-family: 'Merriweather', serif !important;
      font-size: 0.95rem !important;
    }
    #nc-root input[type="text"]:focus,
    #nc-root input[type="date"]:focus,
    #nc-root textarea:focus {
      border-color: var(--amber) !important;
      outline: none !important;
      box-shadow: none !important;
    }

    /* ── login page ── */
    [class*="AuthenticationPage"] {
      background: var(--bg) !important;
    }
    [class*="AuthenticationPage"] section,
    [class*="AuthenticationPage"] > div {
      background: var(--bg2) !important;
      border: 1px solid var(--border) !important;
      border-radius: 5px !important;
      box-shadow: none !important;
    }
    [class*="AuthenticationPage"] h1 {
      font-family: 'Merriweather', serif !important;
      color: var(--text) !important;
    }
    [class*="AuthenticationPage"] p {
      color: var(--muted) !important;
    }
    [class*="AuthenticationPage"] button {
      background: transparent !important;
      color: var(--amber) !important;
      border: 1px solid var(--amber) !important;
      border-radius: 3px !important;
      box-shadow: none !important;
    }
    [class*="AuthenticationPage"] button:hover {
      background: var(--amber) !important;
      color: var(--bg) !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerEventListener({
      name: 'postLogout',
      handler: () => { window.location.href = '/'; }
    });

    // ── UI patches ───────────────────────────────────────────
    const AVATAR_URL = 'https://shaswata.me/assets/profile_picture.DNMGGUvM.jpg';
    const patched = new Set();

    function patchUI() {
      // hide quick add — find by text content
      document.querySelectorAll('#nc-root header [role="button"]').forEach(el => {
        if (el.textContent.includes('Quick add') || el.textContent.includes('quick add')) {
          const wrapper = el.closest('div') || el;
          wrapper.style.setProperty('display', 'none', 'important');
        }
      });

      // replace header avatar (only when logged in — header has account dropdown)
      const avatarBtn = document.querySelector('[aria-label="Account options dropdown"]');
      if (avatarBtn && !patched.has('avatar')) {
        const svgWrapper = avatarBtn.querySelector('span > svg, span > span');
        if (svgWrapper) {
          const img = document.createElement('img');
          img.src = AVATAR_URL;
          Object.assign(img.style, {
            width: '30px', height: '30px', borderRadius: '50%',
            objectFit: 'cover', border: '1px solid #4a4440', display: 'block'
          });
          svgWrapper.parentElement.replaceChild(img, svgWrapper);
          patched.add('avatar');
        }
      }

      // fix "NEW BLOG POSTS" button alignment
      document.querySelectorAll('#nc-root main > div:first-child a').forEach(btn => {
        if (!patched.has(btn)) {
          btn.style.setProperty('display', 'inline-flex', 'important');
          btn.style.setProperty('align-items', 'center', 'important');
          btn.style.setProperty('justify-content', 'center', 'important');
          btn.style.setProperty('line-height', '1', 'important');
          patched.add(btn);
        }
      });
    }

    setTimeout(patchUI, 1200);
    setInterval(patchUI, 2000);

    // ── autosave ──────────────────────────────────────────────
    const AUTOSAVE_PREFIX = 'cms_autosave:';
    const AUTOSAVE_INTERVAL = 30000;
    let autosaveKey = null;
    let isDirty = false;
    let restoreBanner = null;

    function getAutosaveKey() {
      return AUTOSAVE_PREFIX + location.hash;
    }

    function scrapeFields() {
      const fields = {};
      // text inputs (title, date, description, etc.)
      document.querySelectorAll('#nc-root input[type="text"], #nc-root input[type="date"]').forEach(el => {
        const label = el.closest('[class]')?.querySelector('label')?.textContent?.trim()
          || el.placeholder || el.name;
        if (label) fields[label] = el.value;
      });
      // markdown / codemirror body
      const cm = document.querySelector('.cm-content');
      if (cm) fields['__body__'] = cm.innerText;
      // boolean toggles
      document.querySelectorAll('#nc-root input[type="checkbox"]').forEach(el => {
        const label = el.closest('[class]')?.querySelector('label')?.textContent?.trim() || el.name;
        if (label) fields[label] = el.checked;
      });
      return fields;
    }

    function saveToStorage() {
      const key = getAutosaveKey();
      if (!key.includes('/entries/') && !key.includes('/new')) return;
      const fields = scrapeFields();
      if (Object.keys(fields).length === 0) return;
      localStorage.setItem(key, JSON.stringify({ fields, ts: Date.now() }));
      isDirty = false;
    }

    function clearAutosave(key) {
      localStorage.removeItem(key || getAutosaveKey());
    }

    function showRestoreBanner(saved) {
      if (restoreBanner) return;
      const age = Math.round((Date.now() - saved.ts) / 60000);
      restoreBanner = document.createElement('div');
      restoreBanner.id = 'autosave-banner';
      restoreBanner.innerHTML = `
        <span>Unsaved draft found (${age} min ago)</span>
        <button id="autosave-restore">Restore</button>
        <button id="autosave-discard">Discard</button>
      `;
      Object.assign(restoreBanner.style, {
        position: 'fixed', bottom: '1.5rem', left: '50%',
        transform: 'translateX(-50%)',
        background: '#242220', border: '1px solid #c4a67a',
        borderRadius: '4px', padding: '0.6rem 1rem',
        display: 'flex', alignItems: 'center', gap: '0.75rem',
        zIndex: '99999', fontFamily: 'Inter, sans-serif',
        fontSize: '0.82rem', color: '#d4c9bb', boxShadow: '0 4px 16px rgba(0,0,0,0.4)'
      });
      document.body.appendChild(restoreBanner);

      document.getElementById('autosave-restore').addEventListener('click', () => {
        restoreFields(saved.fields);
        restoreBanner.remove(); restoreBanner = null;
      });
      document.getElementById('autosave-discard').addEventListener('click', () => {
        clearAutosave();
        restoreBanner.remove(); restoreBanner = null;
      });

      // style buttons
      ['autosave-restore', 'autosave-discard'].forEach((id, i) => {
        const btn = document.getElementById(id);
        Object.assign(btn.style, {
          background: 'transparent', border: '1px solid',
          borderColor: i === 0 ? '#c4a67a' : '#4a4440',
          color: i === 0 ? '#c4a67a' : '#7a6a5a',
          borderRadius: '3px', padding: '0.25rem 0.6rem',
          cursor: 'pointer', fontSize: '0.78rem', fontFamily: 'Inter, sans-serif'
        });
      });
    }

    function setNativeValue(el, value) {
      // React controls inputs — need to trigger synthetic event
      const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value')?.set;
      if (nativeInputValueSetter) {
        nativeInputValueSetter.call(el, value);
        el.dispatchEvent(new Event('input', { bubbles: true }));
      }
    }

    function restoreFields(fields) {
      document.querySelectorAll('#nc-root input[type="text"], #nc-root input[type="date"]').forEach(el => {
        const label = el.closest('[class]')?.querySelector('label')?.textContent?.trim()
          || el.placeholder || el.name;
        if (label && fields[label] !== undefined) setNativeValue(el, fields[label]);
      });
      // codemirror body — dispatch transaction
      if (fields['__body__']) {
        const cmView = document.querySelector('.cm-editor')?._cmView
          || document.querySelector('.cm-editor')?.CodeMirror;
        if (cmView?.dispatch) {
          cmView.dispatch({
            changes: { from: 0, to: cmView.state.doc.length, insert: fields['__body__'] }
          });
        }
      }
    }

    // watch for route changes (hash = entry navigation)
    let lastHash = '';
    function onHashChange() {
      const key = getAutosaveKey();
      if (key === lastHash) return;
      lastHash = key;
      isDirty = false;
      if (restoreBanner) { restoreBanner.remove(); restoreBanner = null; }

      if (!key.includes('/entries/') && !key.includes('/new')) return;

      // check for stored autosave
      setTimeout(() => {
        const stored = localStorage.getItem(key);
        if (!stored) return;
        try {
          const saved = JSON.parse(stored);
          if (saved && saved.ts && saved.fields) showRestoreBanner(saved);
        } catch { clearAutosave(key); }
      }, 1200); // wait for CMS to render fields
    }

    // mark dirty on any input
    document.addEventListener('input', () => { isDirty = true; }, true);

    // periodic autosave
    setInterval(() => {
      if (isDirty) saveToStorage();
    }, AUTOSAVE_INTERVAL);

    // clear autosave on successful save/publish
    CMS.registerEventListener({ name: 'preSave', handler: () => { clearAutosave(); isDirty = false; } });
    CMS.registerEventListener({ name: 'postSave', handler: () => { clearAutosave(); isDirty = false; } });

    // warn before leaving with unsaved changes
    window.addEventListener('beforeunload', e => {
      if (isDirty) { e.preventDefault(); e.returnValue = ''; }
    });

    // watch hash changes for entry navigation
    window.addEventListener('hashchange', onHashChange);
    window.addEventListener('load', () => setTimeout(onHashChange, 800));
  </script>
</body>
</html>
