<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.github.com https://sveltia-cms-auth.shaswata56.workers.dev https://unpkg.com; frame-src 'none'; object-src 'none';" />
  <title>Blog Admin — Shaswata</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #1a1917;
      --bg2:     #242220;
      --border:  #4a4440;
      --text:    #d4c9bb;
      --muted:   #7a6a5a;
      --amber:   #c4a67a;
      --amber-h: #d9bc94;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body, #nc-root {
      background: var(--bg) !important;
      color: var(--text) !important;
      font-family: 'Inter', system-ui, sans-serif !important;
      font-size: 15px;
    }

    /* scrollbar */
    ::-webkit-scrollbar { width: 8px; background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 4px; }

    /* ── top nav bar ── */
    header, nav,
    [class*="Header"], [class*="AppBar"],
    [class*="Toolbar"]:not([class*="Editor"]) {
      background: var(--bg2) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: none !important;
      color: var(--text) !important;
    }

    /* nav links */
    header a, header button,
    [class*="Header"] a, [class*="Header"] button {
      color: var(--muted) !important;
      font-size: 0.78rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.08em !important;
      font-weight: 500 !important;
    }
    header a:hover, header a[class*="active"],
    [class*="Header"] a:hover {
      color: var(--amber) !important;
    }

    /* ── sidebar ── */
    aside,
    [class*="Sidebar"], [class*="sidebar"],
    [class*="Nav"]:not(nav) {
      background: var(--bg2) !important;
      border-right: 1px solid var(--border) !important;
      box-shadow: none !important;
    }

    aside a, aside button,
    [class*="Sidebar"] a, [class*="Sidebar"] button {
      color: var(--muted) !important;
      font-size: 0.82rem !important;
    }
    aside a:hover, aside a[class*="active"],
    [class*="Sidebar"] a[class*="active"] {
      color: var(--amber) !important;
      background: transparent !important;
    }

    /* ── main area ── */
    main, [class*="Main"], [class*="Collection"],
    [class*="EditorContainer"] {
      background: var(--bg) !important;
    }

    /* collection heading */
    [class*="Collection"] h1,
    [class*="CollectionTop"] h1 {
      font-family: 'Merriweather', serif !important;
      color: var(--text) !important;
      font-size: 1.3rem !important;
      font-weight: 700 !important;
    }

    /* ── buttons (global) ── */
    button, [role="button"] {
      font-family: 'Inter', sans-serif !important;
      transition: background-color 0.15s, color 0.15s, border-color 0.15s !important;
    }

    /* primary action buttons */
    [class*="NewEntry"] button,
    [class*="PublishButton"] button,
    [class*="PublishControl"] button,
    button[class*="primary"],
    button[class*="Primary"] {
      background: transparent !important;
      color: var(--amber) !important;
      border: 1px solid var(--amber) !important;
      border-radius: 3px !important;
      box-shadow: none !important;
      font-size: 0.82rem !important;
      font-weight: 500 !important;
      padding: 0.45rem 1rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.06em !important;
    }
    [class*="NewEntry"] button:hover,
    [class*="PublishButton"] button:hover,
    [class*="PublishControl"] button:hover,
    button[class*="primary"]:hover,
    button[class*="Primary"]:hover {
      background: var(--amber) !important;
      color: var(--bg) !important;
    }

    /* ── entry / post list cards ── */
    [class*="ListCard"], [class*="EntryCard"],
    [class*="Entry"]:not(header):not(aside) {
      background: var(--bg2) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      box-shadow: none !important;
      color: var(--text) !important;
      transition: border-color 0.15s !important;
    }
    [class*="ListCard"]:hover, [class*="EntryCard"]:hover {
      border-color: var(--amber) !important;
    }
    [class*="ListCard"] *, [class*="EntryCard"] * {
      color: var(--text) !important;
      font-family: 'Merriweather', serif !important;
    }

    /* ── search ── */
    input[type="search"], [class*="Search"] input {
      background: var(--bg) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      color: var(--text) !important;
      font-family: 'Inter', sans-serif !important;
      font-size: 0.85rem !important;
      padding: 0.4rem 0.75rem !important;
    }
    input[type="search"]:focus, [class*="Search"] input:focus {
      border-color: var(--amber) !important;
      outline: none !important;
    }

    /* ── editor toolbar ── */
    [class*="EditorToolbar"], [class*="Toolbar"][class*="Editor"] {
      background: var(--bg2) !important;
      border-bottom: 1px solid var(--border) !important;
      box-shadow: none !important;
    }

    /* ── form labels ── */
    label, [class*="Label"], [class*="FieldLabel"] {
      color: var(--muted) !important;
      font-size: 0.7rem !important;
      text-transform: uppercase !important;
      letter-spacing: 0.1em !important;
      font-family: 'Inter', sans-serif !important;
      font-weight: 500 !important;
    }

    /* ── form inputs ── */
    input[type="text"], input[type="date"],
    input[type="email"], textarea, select,
    [class*="TextControl"], [class*="Input"] {
      background: var(--bg2) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      color: var(--text) !important;
      font-family: 'Merriweather', serif !important;
      font-size: 0.95rem !important;
    }
    input[type="text"]:focus, input[type="date"]:focus,
    textarea:focus, select:focus,
    [class*="TextControl"]:focus {
      border-color: var(--amber) !important;
      outline: none !important;
      box-shadow: none !important;
    }

    /* ── markdown / code editor ── */
    .cm-editor, .CodeMirror,
    [class*="CodeMirror"], [class*="RawEditor"] {
      background: var(--bg2) !important;
      color: var(--text) !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      font-family: 'Merriweather', serif !important;
      font-size: 1rem !important;
    }
    .cm-gutters { background: var(--bg) !important; border-right: 1px solid var(--border) !important; }
    .cm-activeLineGutter, .cm-activeLine { background: rgba(196,166,122,0.05) !important; }
    .cm-cursor { border-left-color: var(--amber) !important; }

    /* ── login page ── */
    [class*="AuthenticationPage"],
    [class*="Login"] {
      background: var(--bg) !important;
    }
    [class*="AuthenticationPage"] > *,
    [class*="Login"] > * {
      background: var(--bg2) !important;
      border: 1px solid var(--border) !important;
      border-radius: 5px !important;
      box-shadow: none !important;
      max-width: 360px !important;
    }
    [class*="AuthenticationPage"] h1 {
      font-family: 'Merriweather', serif !important;
      color: var(--text) !important;
      font-size: 1.3rem !important;
    }
    [class*="AuthenticationPage"] p {
      color: var(--muted) !important;
      font-size: 0.85rem !important;
    }
    [class*="AuthenticationPage"] button {
      background: transparent !important;
      color: var(--amber) !important;
      border: 1px solid var(--amber) !important;
      border-radius: 3px !important;
      box-shadow: none !important;
    }
    [class*="AuthenticationPage"] button:hover {
      background: var(--amber) !important;
      color: var(--bg) !important;
    }

    /* kill blue everywhere */
    [style*="background-color: rgb(50, 115, 220)"],
    [style*="background-color: rgb(21, 101, 192)"],
    [style*="background: rgb(50, 115, 220)"] {
      background-color: var(--amber) !important;
      color: var(--bg) !important;
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.registerEventListener({
      name: 'postLogout',
      handler: () => { window.location.href = '/'; }
    });
  </script>
</body>
</html>
